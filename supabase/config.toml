[functions.engine-generate]
# Standalone Engine API entrypoint. Auth is our own X-Service-Key
# (ENGINE_SERVICE_KEY); skip Supabase's JWT gate so it reaches our handler.
verify_jwt = false

[functions.gym-services]
# The generation seam (SERVICE_API_CONTRACT v2 / Decision 12a): the affiliate
# backend requests generated Engine blocks at block boundaries. Server-to-server;
# WHOLESALE consumer-key family (tenant-bound), so skip Supabase's JWT gate.
# Zero member identity; nothing stored.
verify_jwt = false

[functions.gym-cohort-cron]
# Task #5 — KICKOFF for staged gym cohort generation (creates a gym_program_jobs
# row + fires gym-generate; no longer runs the pipeline in-process — see the
# 20260707200000 migration). verify_jwt=false; X-Cron-Key (GYM_COHORT_CRON_KEY)
# fail-closed.
verify_jwt = false

[functions.gym-cohort-config]
# The affiliate portal's door to a gym's cohort program spec (the owner brief
# seam — gym_cohort_configs' intended write path). Server-to-server; auth is our
# own X-Service-Key (the WHOLESALE key family, tenant-bound), so skip the JWT gate.
verify_jwt = false

[functions.gym-program]
# The portal review desk's control door (start paused / status / approve /
# discard) for the gym's main program. Server-to-server; auth is our own
# X-Service-Key (the WHOLESALE key family, tenant-bound), so skip the JWT gate.
verify_jwt = false

[functions.gym-generate]
# Staged gym cohort generation worker (mirror of generate-program-v3's per-stage
# dispatcher, on gym_program_jobs). Auth is our own: resume = service-role bearer
# (self-retrigger/reaper); approve = service-role bearer or X-Cron-Key. Skip
# Supabase's JWT gate so those reach the handler.
verify_jwt = false

[functions.gym-job-reaper]
# Sweep for vanished gym-generate stage workers (mirror of job-reaper on
# gym_program_jobs). Schedule via pg_cron every ~2 min. Same open-endpoint
# rationale as job-reaper: the sweep only touches expired leases.
verify_jwt = false

[functions.reconcile-programming-months]
# Daily paid-vs-delivered sweep (auto-heal + audit). Called by pg_cron —
# same no-JWT posture and key-drift rationale as monthly-generation-cron.
verify_jwt = false

[functions.reconcile-engine-months]
# Daily engine paid-vs-unlocked sweep (only-raise, audited). Called by pg_cron —
# same no-JWT posture and key-drift rationale as monthly-generation-cron.
verify_jwt = false

[functions.classify-chat-questions]
# Nightly AI labeling of chat questions (chat_question_insights). Called by
# pg_cron — same no-JWT posture and key-drift rationale as the reconcilers;
# responses carry counts/ids/labels only, never chat content.
verify_jwt = false
